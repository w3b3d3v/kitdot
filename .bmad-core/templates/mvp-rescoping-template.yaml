name: MVP Rescoping & Time Optimization
description: Template for optimizing roadmap to fit within time constraints
version: "1.0"
author: PM Agent
elicit: true

sections:
  - id: time_constraints
    title: "Time Constraints Analysis"
    description: "Define specific timeline limitations and requirements"
    fields:
      - name: current_timeline_estimate
        label: "Current Roadmap Timeline"
        type: text
        required: true
        placeholder: "e.g., 16 weeks, 4 months"
        
      - name: target_deadline
        label: "Target Deadline"
        type: text
        required: true
        placeholder: "e.g., 12 weeks, March 15th"
        
      - name: team_capacity
        label: "Team Capacity"
        type: textarea
        required: true
        placeholder: "Team size, hours per week, skill distribution"
        
      - name: external_constraints
        label: "External Constraints"
        type: textarea
        required: false
        placeholder: "Conferences, funding deadlines, market windows"

  - id: gap_analysis
    title: "Timeline Gap Analysis"
    description: "Quantify the gap between current estimate and target"
    fields:
      - name: timeline_gap
        label: "Timeline Gap"
        type: text
        required: true
        placeholder: "e.g., 4 weeks behind target"
        
      - name: effort_reduction_needed
        label: "Effort Reduction Needed"
        type: text
        required: true
        placeholder: "e.g., 25% reduction required"
        
      - name: critical_path_analysis
        label: "Critical Path Features"
        type: textarea
        required: true
        placeholder: "Features that block other development"
        
      - name: current_phase_breakdown
        label: "Current Phase Effort Distribution"
        type: textarea
        required: true
        placeholder: "Phase 1: 6 weeks, Phase 2: 8 weeks, Phase 3: 2 weeks"

  - id: optimization_options
    title: "Optimization Strategies"
    description: "Explore different approaches to meet timeline"
    fields:
      - name: features_to_defer
        label: "Features to Defer Post-MVP"
        type: textarea
        required: true
        placeholder: "Non-critical features that can launch separately"
        
      - name: features_to_simplify
        label: "Features to Simplify"
        type: textarea
        required: true
        placeholder: "Complex features that can be implemented more simply"
        
      - name: technical_shortcuts
        label: "Technical Shortcuts Available"
        type: textarea
        required: false
        placeholder: "Third-party services, existing libraries, templates"
        
      - name: parallel_development
        label: "Parallel Development Opportunities"
        type: textarea
        required: false
        placeholder: "Features that can be built simultaneously"

  - id: scope_reduction
    title: "Scope Reduction Recommendations"
    description: "Specific features and complexity to remove"
    fields:
      - name: features_to_cut
        label: "Features to Cut Completely"
        type: textarea
        required: true
        placeholder: "Features that can be removed without impacting core value"
        
      - name: ui_simplifications
        label: "UI/UX Simplifications"
        type: textarea
        required: false
        placeholder: "Complex UI elements that can be simplified"
        
      - name: integration_simplifications
        label: "Integration Simplifications"
        type: textarea
        required: false
        placeholder: "Complex integrations that can be simplified or mocked"
        
      - name: admin_feature_cuts
        label: "Admin/Internal Tool Cuts"
        type: textarea
        required: false
        placeholder: "Admin panels, reporting tools that can use existing tools"

  - id: revised_roadmap
    title: "Time-Optimized Roadmap"
    description: "Restructured roadmap that fits timeline constraints"
    fields:
      - name: phase_1_foundation
        label: "Phase 1: Foundation"
        type: textarea
        required: true
        placeholder: "Duration, core features, success criteria"
        
      - name: phase_2_core
        label: "Phase 2: Core Features"
        type: textarea
        required: true
        placeholder: "Duration, core features, success criteria"
        
      - name: phase_3_launch
        label: "Phase 3: Launch Preparation"
        type: textarea
        required: true
        placeholder: "Duration, core features, success criteria"
        
      - name: post_mvp_features
        label: "Post-MVP Feature Pipeline"
        type: textarea
        required: false
        placeholder: "Features planned for after MVP launch"

  - id: risk_assessment
    title: "Timeline Risk Assessment"
    description: "Risks and mitigation strategies for aggressive timeline"
    fields:
      - name: technical_risks
        label: "Technical Risks"
        type: textarea
        required: true
        placeholder: "Integration complexity, unknown technologies, performance"
        
      - name: resource_risks
        label: "Resource Risks"
        type: textarea
        required: true
        placeholder: "Team availability, skill gaps, competing priorities"
        
      - name: quality_risks
        label: "Quality Risks"
        type: textarea
        required: true
        placeholder: "Testing coverage, technical debt, user experience"
        
      - name: mitigation_strategies
        label: "Risk Mitigation Strategies"
        type: textarea
        required: true
        placeholder: "Specific actions to address each risk category"

  - id: alternative_approaches
    title: "Alternative Delivery Approaches"
    description: "Different ways to structure the delivery"
    fields:
      - name: strict_mvp_approach
        label: "Strict MVP Approach"
        type: textarea
        required: true
        placeholder: "Absolute minimum features, high technical debt acceptable"
        
      - name: phased_launch_approach
        label: "Phased Launch Approach"
        type: textarea
        required: true
        placeholder: "Multiple smaller releases building up to full product"
        
      - name: parallel_tracks_approach
        label: "Parallel Development Tracks"
        type: textarea
        required: false
        placeholder: "Split team across independent workstreams"
        
      - name: recommended_approach
        label: "Recommended Approach"
        type: textarea
        required: true
        placeholder: "Which approach best balances timeline, quality, and value"

  - id: implementation_plan
    title: "Implementation Planning"
    description: "Detailed plan for executing the optimized roadmap"
    fields:
      - name: sprint_breakdown
        label: "Sprint Breakdown"
        type: textarea
        required: true
        placeholder: "How phases break into sprints with specific goals"
        
      - name: milestone_adjustments
        label: "Milestone Adjustments"
        type: textarea
        required: true
        placeholder: "Updated milestone dates and success criteria"
        
      - name: team_allocation
        label: "Team Allocation Strategy"
        type: textarea
        required: true
        placeholder: "How team members are allocated across workstreams"
        
      - name: buffer_management
        label: "Buffer Time Management"
        type: textarea
        required: true
        placeholder: "How buffers are allocated for testing, deployment, fixes"

  - id: success_metrics
    title: "Success Metrics & Validation"
    description: "How to measure success of the optimized approach"
    fields:
      - name: timeline_success_criteria
        label: "Timeline Success Criteria"
        type: textarea
        required: true
        placeholder: "Specific dates and milestones that must be met"
        
      - name: quality_success_criteria
        label: "Quality Success Criteria"
        type: textarea
        required: true
        placeholder: "Minimum quality standards that cannot be compromised"
        
      - name: business_success_criteria
        label: "Business Success Criteria"
        type: textarea
        required: true
        placeholder: "Business outcomes the MVP must achieve"
        
      - name: monitoring_approach
        label: "Progress Monitoring Approach"
        type: textarea
        required: true
        placeholder: "How progress will be tracked and course-corrected"

validation_rules:
  - field: timeline_gap
    rule: "Must be quantified in specific time units"
    
  - field: effort_reduction_needed
    rule: "Should be expressed as percentage"
    
  - field: features_to_defer
    rule: "Must identify specific features, not general categories"
    
  - field: revised_roadmap
    rule: "Phase durations must sum to target timeline"

output_format: markdown
output_sections:
  - time_constraints
  - gap_analysis
  - optimization_options
  - scope_reduction
  - revised_roadmap
  - risk_assessment
  - alternative_approaches
  - implementation_plan
  - success_metrics