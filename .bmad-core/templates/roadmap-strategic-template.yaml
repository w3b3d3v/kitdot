name: Strategic Roadmap & MVP Plan
description: Template for creating comprehensive strategic roadmap from project notes
version: "1.0"
author: PM Agent
elicit: true

sections:
  - id: executive_summary
    title: "Executive Summary"
    description: "High-level project overview and strategic direction"
    fields:
      - name: project_vision
        label: "Project Vision"
        type: textarea
        required: true
        placeholder: "What is the long-term vision for this project?"
        
      - name: target_market
        label: "Target Market & Users"
        type: textarea
        required: true
        placeholder: "Who are your primary users and what market are you targeting?"
        
      - name: core_problem
        label: "Core Problem Being Solved"
        type: textarea
        required: true
        placeholder: "What specific problem does this project solve for users?"
        
      - name: success_metrics
        label: "Success Metrics & KPIs"
        type: textarea
        required: true
        placeholder: "How will you measure success? (e.g., user adoption, revenue, engagement)"

  - id: business_analysis
    title: "Business Areas Breakdown"
    description: "Categorized analysis of all project components"
    fields:
      - name: core_product_features
        label: "Core Product Features"
        type: textarea
        required: true
        placeholder: "Essential features that define the product's core value"
        
      - name: user_experience_requirements
        label: "User Experience Requirements"
        type: textarea
        required: true
        placeholder: "UI/UX needs, onboarding, user flows"
        
      - name: technical_infrastructure
        label: "Technical Infrastructure"
        type: textarea
        required: true
        placeholder: "Backend, database, APIs, DevOps, security requirements"
        
      - name: growth_marketing
        label: "Growth & Marketing"
        type: textarea
        required: false
        placeholder: "User acquisition strategies, SEO, content marketing, branding"
        
      - name: operations_support
        label: "Operations & Support"
        type: textarea
        required: false
        placeholder: "Analytics, monitoring, customer support, maintenance"
        
      - name: compliance_legal
        label: "Compliance & Legal"
        type: textarea  
        required: false
        placeholder: "Privacy requirements, terms of service, security compliance"

  - id: mvp_definition
    title: "MVP Strategy & Scope"
    description: "Clearly defined minimum viable product"
    fields:
      - name: mvp_core_features
        label: "MVP Core Features"
        type: textarea
        required: true
        placeholder: "List the essential features for MVP (aim for <10 major features)"
        
      - name: mvp_success_criteria
        label: "MVP Success Criteria"
        type: textarea
        required: true
        placeholder: "What metrics/outcomes would make the MVP successful?"
        
      - name: mvp_timeline
        label: "MVP Timeline Estimate"
        type: text
        required: true
        placeholder: "Target timeline for MVP completion (e.g., 8-12 weeks)"
        
      - name: excluded_features
        label: "Features Excluded from MVP"
        type: textarea
        required: true
        placeholder: "Important features that are NOT in MVP and why"

  - id: development_phases
    title: "Development Phases"
    description: "Structured breakdown of implementation phases"
    fields:
      - name: phase_0_foundation
        label: "Phase 0: Foundation"
        type: textarea
        required: true
        placeholder: "Project setup, infrastructure, core models, authentication"
        
      - name: phase_1_core
        label: "Phase 1: Core Features"
        type: textarea
        required: true
        placeholder: "Essential user-facing features and workflows"
        
      - name: phase_2_polish
        label: "Phase 2: Polish & Launch"
        type: textarea
        required: true
        placeholder: "Error handling, edge cases, monitoring, launch preparation"
        
      - name: phase_dependencies
        label: "Phase Dependencies"
        type: textarea
        required: true
        placeholder: "What must be completed before each phase can begin?"

  - id: github_structure
    title: "GitHub Project Structure"
    description: "Organization of milestones, epics, and issues"
    fields:
      - name: milestones_plan
        label: "GitHub Milestones"
        type: textarea
        required: true
        placeholder: "List proposed milestones with target dates"
        
      - name: epics_breakdown
        label: "Epic Definitions"
        type: textarea
        required: true
        placeholder: "Major epics with user value statements"
        
      - name: issue_categories
        label: "Issue Categories"
        type: textarea
        required: true
        placeholder: "Types of issues: features, bugs, documentation, technical debt"

  - id: risk_assessment
    title: "Risk Assessment & Mitigation"
    description: "Identified risks and mitigation strategies"
    fields:
      - name: technical_risks
        label: "Technical Risks"
        type: textarea
        required: true
        placeholder: "Technology choices, integration challenges, scalability concerns"
        
      - name: market_risks
        label: "Market Risks"
        type: textarea
        required: true
        placeholder: "Competition, user adoption, market timing"
        
      - name: resource_risks
        label: "Resource Risks"
        type: textarea
        required: true
        placeholder: "Team capacity, timeline constraints, budget limitations"
        
      - name: mitigation_strategies
        label: "Mitigation Strategies"
        type: textarea
        required: true
        placeholder: "How will you address the identified risks?"

  - id: post_mvp_roadmap
    title: "Post-MVP Roadmap"
    description: "Future enhancements and growth strategy"
    fields:
      - name: immediate_post_mvp
        label: "Immediate Post-MVP Features"
        type: textarea
        required: false
        placeholder: "First features to add after MVP launch"
        
      - name: growth_features
        label: "Growth & Enhancement Features"
        type: textarea
        required: false
        placeholder: "Features for user growth and engagement"
        
      - name: scaling_considerations
        label: "Scaling Considerations"
        type: textarea
        required: false
        placeholder: "Technical and business scaling requirements"

  - id: next_steps
    title: "Implementation Next Steps"
    description: "Clear actions for moving forward"
    fields:
      - name: immediate_actions
        label: "Immediate Actions (Next 1-2 weeks)"
        type: textarea
        required: true
        placeholder: "What should be done immediately to start development?"
        
      - name: development_readiness
        label: "Development Team Readiness"
        type: textarea
        required: true
        placeholder: "What does the dev team need to begin Phase 0?"
        
      - name: stakeholder_approvals
        label: "Required Approvals"
        type: textarea
        required: false
        placeholder: "What approvals or sign-offs are needed before proceeding?"

validation_rules:
  - field: mvp_core_features
    rule: "Should contain fewer than 15 distinct features"
    
  - field: mvp_timeline  
    rule: "Should be realistic for team size and complexity"
    
  - field: phase_0_foundation
    rule: "Must include project setup and basic infrastructure"
    
output_format: markdown
output_sections:
  - executive_summary
  - business_analysis  
  - mvp_definition
  - development_phases
  - github_structure
  - risk_assessment
  - post_mvp_roadmap
  - next_steps